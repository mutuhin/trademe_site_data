name: Backfill VIN and Plate

on:
  workflow_dispatch:   # Manual trigger only from GitHub UI

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # Checkpoint/resume: re-trigger if cancelled, skips completed URLs

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install playwright

      - name: Install Playwright browser
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run backfill
        run: python backfill_vin_plate.py --concurrency 20

      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/
          git diff --staged --quiet || git commit -m "Backfill VIN/Plate: $(date -u +%Y-%m-%d)"
          git push
