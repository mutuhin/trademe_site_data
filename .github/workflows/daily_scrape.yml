name: Daily Trade Me Scraper

on:
  schedule:
    - cron: '0 20 * * *'   # 8 AM NZT (UTC+12) every day
  workflow_dispatch:         # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60      # Checkpoint/resume: if cancelled, next run skips completed brands

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install playwright aiohttp

      - name: Install Playwright browser
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python trademe_playwright_scraper.py

      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/
          git diff --staged --quiet || git commit -m "Daily scrape: $(date -u +%Y-%m-%d) ($(ls output/trademe_cars_$(date -u +%Y-%m-%d).csv 2>/dev/null | xargs wc -l 2>/dev/null | awk '{print $1-1}' || echo '?') records)"
          git push
